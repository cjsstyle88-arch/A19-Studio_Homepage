backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "gallery"
    label: "포트폴리오"
    files:
      - name: "gallery"
        label: "작품 목록"
        file: "content/gallery.json"
        fields:
          - label: "작품들"
            name: "items"
            widget: "list"
            summary: "{{title}}"
            fields:
              - {label: "제목", name: "title", widget: "string"}
              - {label: "설명", name: "desc", widget: "text"}
              - label: "카테고리"
                name: "category"
                widget: "select"
                options: ["테이블", "선반", "의자 · 스툴", "콘솔", "기타"]
                default: "기타"
              - label: "사진 (여러 장 한번에 선택 가능)"
                name: "images"
                widget: "image"
                multiple: true
                required: false
                media_library: {config: {multiple: true}}

  - name: "notices"
    label: "공지사항"
    files:
      - name: "notices"
        label: "공지 목록"
        file: "content/notices.json"
        fields:
          - label: "공지들"
            name: "items"
            widget: "list"
            summary: "{{title}}"
            fields:
              - {label: "제목", name: "title", widget: "string"}
              - {label: "날짜", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}
              - {label: "내용", name: "body", widget: "text"}
